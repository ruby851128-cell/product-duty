<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>成衣產品關稅查詢工具(版本：2026/5/11)</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #636a73;
      --line: #d9d9d3;
      --accent: #0f766e;
      --accent-soft: #d8f3ea;
      --warn: #9a6700;
      --warn-soft: #fff0c2;
      --bad: #b42318;
      --bad-soft: #ffe2dd;
      --neutral-soft: #e9eef3;
      --shadow: 0 1px 2px rgba(24, 30, 35, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .app {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
    }

    .icon-button:hover {
      border-color: var(--line);
      background: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .duty-primer {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    .primer-box {
      min-height: 96px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .primer-box.product {
      border-color: #e5b300;
      box-shadow: inset 0 4px 0 #f5c400;
    }

    .primer-box.remedy {
      border-color: #dda7a7;
      box-shadow: inset 0 4px 0 #e9b7b7;
    }

    .primer-box.policy {
      border-color: #8ab4f8;
      box-shadow: inset 0 4px 0 #8ab4f8;
    }

    .primer-box.total {
      border-color: #0f766e;
      box-shadow: inset 0 4px 0 #0f766e;
    }

    .primer-title {
      font-weight: 900;
      margin-bottom: 7px;
    }

    .primer-copy {
      color: var(--muted);
      font-size: 13px;
    }

    .plus {
      display: grid;
      place-items: center;
      color: #111827;
      font-size: 30px;
      font-weight: 900;
    }

    label {
      display: block;
      color: #30343a;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select,
    input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      font: inherit;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .result {
      padding: 20px;
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .rate {
      font-size: 25px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
      color: #07584f;
      background: var(--accent-soft);
      white-space: nowrap;
    }

    .pill.warning {
      color: var(--warn);
      background: var(--warn-soft);
    }

    .pill.bad {
      color: var(--bad);
      background: var(--bad-soft);
    }

    .pill.neutral {
      color: #425466;
      background: var(--neutral-soft);
    }

    .agreement {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .section {
      margin-top: 14px;
    }

    .section-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .section-body {
      white-space: pre-line;
    }

    .link-list {
      display: grid;
      gap: 6px;
    }

    .link-list a {
      color: #075db3;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .link-list a:hover {
      text-decoration: underline;
    }

    .note {
      color: #3f4650;
      background: #f7faf9;
      border-left: 3px solid var(--accent);
      padding: 10px 12px;
      border-radius: 6px;
      white-space: pre-line;
    }

    .us-alert {
      color: #12395d;
      background: #eaf4ff;
      border-left: 3px solid #2f80ed;
      padding: 10px 12px;
      border-radius: 6px;
      white-space: pre-line;
    }

    .overview {
      overflow: hidden;
    }

    .overview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .overview-title {
      font-weight: 800;
    }

    .overview-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .market-list {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .market-row {
      display: grid;
      grid-template-columns: 128px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 9px 14px;
      background: #fff;
      cursor: pointer;
    }

    .market-row:hover {
      background: #f9fbfa;
    }

    .market-row.active {
      box-shadow: inset 3px 0 0 var(--accent);
      background: #f4fbf8;
    }

    .origin-name {
      font-weight: 800;
    }

    .market-summary {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
    }

    .status-dot.good {
      background: #10b981;
    }

    .status-dot.mid {
      background: #f59e0b;
    }

    .status-dot.bad {
      background: #ef4444;
    }

    .toolbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .search {
      width: min(360px, 100%);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f1f4f2;
      color: #30343a;
      font-size: 12px;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .app {
        width: min(100vw - 20px, 680px);
        margin-top: 16px;
      }

      header,
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .controls,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .duty-primer {
        grid-template-columns: 1fr;
      }

      .plus {
        display: none;
      }

      .market-row {
        grid-template-columns: 110px 1fr auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>成衣產品關稅查詢工具(版本：2026/5/11)</h1>
        <div class="meta">HS 61/62 內部初版資料，正式出貨前仍需以最新海關稅則與 FTA 原文複核。</div>
      </div>
      <button class="icon-button" aria-label="更多選項" title="更多選項">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="5" cy="12" r="1.8" fill="currentColor"></circle>
          <circle cx="12" cy="12" r="1.8" fill="currentColor"></circle>
          <circle cx="19" cy="12" r="1.8" fill="currentColor"></circle>
        </svg>
      </button>
    </header>

    <section class="duty-primer" aria-label="關稅架構提醒">
      <div class="primer-box product">
        <div class="primer-title">產品本身關稅</div>
        <div class="primer-copy">一般稅率、FTA 優惠稅率、GSP/LDC 等。</div>
      </div>
      <div class="plus">+</div>
      <div class="primer-box remedy">
        <div class="primer-title">貿易救濟關稅</div>
        <div class="primer-copy">301 條款、反傾銷稅、反補貼稅等。</div>
      </div>
      <div class="plus">+</div>
      <div class="primer-box policy">
        <div class="primer-title">政策性加徵關稅</div>
        <div class="primer-copy">例如川普對等關稅、暫時性加徵。</div>
      </div>
      <div class="plus">=</div>
      <div class="primer-box total">
        <div class="primer-title">預估總負擔關稅</div>
        <div class="primer-copy">業務報價前應看加總效果，不只看 FTA。</div>
      </div>
    </section>

    <section class="controls" aria-label="查詢條件">
      <div>
        <label for="originSelect">產區（出口國）</label>
        <select id="originSelect"></select>
      </div>
      <div>
        <label for="marketSelect">進口市場</label>
        <select id="marketSelect"></select>
      </div>
    </section>

    <section class="main-grid">
      <article class="card result" id="resultCard" aria-live="polite"></article>
      <aside class="card overview">
        <div class="overview-header">
          <div>
            <div class="overview-title">同市場產區比較</div>
            <div class="overview-subtitle" id="overviewSubtitle"></div>
          </div>
        </div>
        <div class="market-list" id="marketList"></div>
      </aside>
    </section>

    <section class="toolbar">
      <div>
        <div class="overview-title">規則資料庫</div>
        <div class="small">可用關鍵字搜尋協定、產區、原產地條件或備註。</div>
      </div>
      <div class="search">
        <label for="keywordInput">搜尋</label>
        <input id="keywordInput" type="search" placeholder="例如：CPTPP、布、QIZ、加拿大" />
      </div>
    </section>

    <table>
      <thead>
        <tr>
          <th>進口市場</th>
          <th>產區</th>
          <th>產品關稅</th>
          <th>川普政策性加徵</th>
          <th>協定</th>
          <th>原產地條件</th>
        </tr>
      </thead>
      <tbody id="ruleTable"></tbody>
    </table>
  </main>

      { market: "加拿大", origin: "埃及", rate: "部分較 MFN 優惠", agreement: "GPT", status: "中性/需看品項", originRule: "不限原料。", note: "需依加拿大 GPT 與 HS 明細確認。" },

      { market: "英國", origin: "越南", rate: "UKVFTA 逐步降至 0%；CPTPP 0%", agreement: "UKVFTA / CPTPP", status: "有利但需確認條件", originRule: "UKVFTA 布：越南、韓國等；CPTPP 紗起：越南或 CPTPP 國家，不含墨西哥/加拿大。", note: "UKVFTA：2021年42.5%成衣立即免關稅，其餘在2027年逐步降到零關稅。", details: ["UKVFTA：2021年42.5%成衣立即免關稅，其餘在2027年逐步降到零關稅。", "CPTPP：零關稅；原產地為紗起，紗須來自越南或 CPTPP 國家，不含墨西哥/加拿大。"] },
      { market: "英國", origin: "印尼", rate: "多為 9.6%", agreement: "DCTS Standard Preferences", status: "中性/需看品項", originRule: "布：柬埔寨、印尼、越南、菲律賓、緬甸、寮國等。", note: "" },
      { market: "英國", origin: "柬埔寨", rate: "0%", agreement: "DCTS Comprehensive Preferences", status: "有利", originRule: "不限原料。", note: "" },
      { market: "英國", origin: "薩爾瓦多", rate: "0%", agreement: "英國-中美洲關係協定", status: "有利但需確認條件", originRule: "布：中南美洲、加勒比海、墨西哥、歐盟、英國；或不限紗源但需在受惠國製成布。", note: "部分品項有限額。" },
      { market: "英國", origin: "孟加拉", rate: "0%", agreement: "DCTS Comprehensive Preferences", status: "有利", originRule: "不限原料。", note: "" },
      { market: "英國", origin: "約旦", rate: "平均 12%", agreement: "無關稅優惠", status: "不利", originRule: "目前無成衣優惠。", note: "以 MFN 為主。" },
      { market: "英國", origin: "埃及", rate: "0%", agreement: "埃及-英國聯合協議", status: "有利但需確認條件", originRule: "布：歐盟、土耳其、英國、瑞士、冰島、挪威、約旦、以色列；或不限紗源但需在埃及製成布。", note: "需確認材料來源。" },

      { market: "澳洲", origin: "越南", rate: "CPTPP 0%；AANZFTA 0%；RCEP 20年逐步降至 0%", agreement: "CPTPP / RCEP / AANZFTA", status: "有利但需確認條件", originRule: "CPTPP 紗起；RCEP 與 AANZFTA 多為不限原料。", note: "", details: ["CPTPP：零關稅；原產地紗起，紗須來自越南或 CPTPP 國家。", "AANZFTA：零關稅；原產地多為不限原料。", "RCEP：2022年起逐步降至零關稅，期程 20 年；原產地多為不限原料。"] },
      { market: "澳洲", origin: "印尼", rate: "AANZFTA 0%；IA-CEPA 0%；RCEP 20年逐步降至 0%", agreement: "RCEP / AANZFTA / IA-CEPA", status: "有利", originRule: "多為不限原料。", note: "", details: ["AANZFTA：零關稅；原產地多為不限原料。", "IA-CEPA：零關稅；原產地多為不限原料。", "RCEP：2023年起逐步降至零關稅，期程 20 年；原產地多為不限原料。"] },
      { market: "澳洲", origin: "柬埔寨", rate: "LDC 0%；AANZFTA 0%；RCEP 20年逐步降至 0%", agreement: "LDC / RCEP / AANZFTA", status: "有利", originRule: "多為不限原料。", note: "", details: ["LDC：零關稅；原產地不限原料。", "AANZFTA：零關稅；原產地多為不限原料。", "RCEP：2022年起逐步降至零關稅，期程 20 年；原產地多為不限原料。"] },
      { market: "澳洲", origin: "薩爾瓦多", rate: "平均約 5%", agreement: "DCS", status: "中性/需看品項", originRule: "不限原料。", note: "需查明細稅率。" },
      { market: "澳洲", origin: "孟加拉", rate: "0%", agreement: "LDC", status: "有利", originRule: "不限原料。", note: "需確認最新 LDC 資格。" },
      { market: "澳洲", origin: "約旦", rate: "平均約 5%", agreement: "DCS", status: "中性/需看品項", originRule: "不限原料。", note: "需查明細稅率。" },
      { market: "澳洲", origin: "埃及", rate: "平均約 5%", agreement: "DCS", status: "中性/需看品項", originRule: "不限原料。", note: "需查明細稅率。" }
    ];

    const origins = [...new Set(rules.map((rule) => rule.origin))];
    const markets = [...new Set(rules.map((rule) => rule.market))];
    const marketLinks = {
      "美國": [
        { label: "USITC Harmonized Tariff Schedule", url: "https://hts.usitc.gov/" }
      ],
      "歐洲": [
        { label: "EU TARIC Consultation", url: "https://ec.europa.eu/taxation_customs/dds2/taric/taric_consultation.jsp?Lang=zh&SimDate=20230303&Area=BD&MeasType=&StartPub=&EndPub=&MeasText=&GoodsText=&op=&Taric=610510&search_text=goods&textSearch=&LangDescr=bg&OrderNum=&Regulation=&measStartDat=&measEndDat=&DatePicker=03-03-2023" }
      ],
      "日本": [
        { label: "Japan Customs Tariff Schedule", url: "https://www.customs.go.jp/english/tariff/2023_02_21/index.htm" }
      ],
      "加拿大": [
        { label: "CBSA Canadian Customs Tariff", url: "https://www.cbsa-asfc.gc.ca/trade-commerce/tariff-tarif/menu-eng.html" },
        { label: "Canada Tariff Finder", url: "https://www.tariffinder.ca/en/getStarted" }
      ],
      "英國": [
        { label: "UK Trade Tariff", url: "https://www.trade-tariff.service.gov.uk/find_commodity" }
      ],
      "澳洲": [
        { label: "Australia FTA Portal", url: "https://ftaportal.dfat.gov.au/" }
      ]
    };
    const originSelect = document.querySelector("#originSelect");
    const marketSelect = document.querySelector("#marketSelect");
    const resultCard = document.querySelector("#resultCard");
    const marketList = document.querySelector("#marketList");
    const overviewSubtitle = document.querySelector("#overviewSubtitle");
    const ruleTable = document.querySelector("#ruleTable");
    const keywordInput = document.querySelector("#keywordInput");

    function fillSelect(select, values, preferred) {
      select.innerHTML = values.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
      select.value = preferred && values.includes(preferred) ? preferred : values[0];
    }

    function classForStatus(status) {
      if (status === "有利") return "good";
      if (status === "不利") return "bad";
      return "mid";
    }

    function pillClass(status) {
      if (status === "有利") return "";
      if (status === "不利") return "bad";
      if (status.includes("待")) return "neutral";
      return "warning";
    }

    function productDuty(rule) {
      if (rule.market !== "美國") return rule.rate;
      const productRates = {
        "越南": "19.7%",
        "印尼": "19.7%",
        "柬埔寨": "19.7%",
        "孟加拉": "19.7%",
        "約旦": "0%",
        "埃及": "0%",
        "薩爾瓦多": "0%"
      };
      return productRates[rule.origin] || rule.rate;
    }

    function trumpTariff(rule) {
      if (rule.market !== "美國") return "不適用";
      if (rule.origin === "薩爾瓦多") return "10% → 0%";
      return "10%";
    }

    function trumpAlert(rule) {
      if (rule.market !== "美國") return "";
      const base = "除了產品本身關稅，仍須外加川普政策性加徵關稅\n10%(目前預估川普暫時性關稅將課徵至2026/7/24)";
      if (rule.origin === "薩爾瓦多") {
        return `${base}\n若符合 CAFTA-DR 原產地規定，成衣可能免除政策性加徵，即 10% → 0%。`;
      }
      return base;
    }

    function selectedRule() {
      return rules.find((rule) => rule.origin === originSelect.value && rule.market === marketSelect.value);
    }

    function marketLinkHtml(market) {
      const links = marketLinks[market] || [];
      if (!links.length) return "";
      return `
        <div class="section">
          <div class="section-title">詳細 HS code 稅率</div>
          <div class="section-body">請洽物流或參考政府關稅查詢系統</div>
          <div class="link-list">
            ${links.map((link) => `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label)}</a>`).join("")}
          </div>
        </div>
      `;
    }

    function updateResult() {
      const rule = selectedRule();
      if (!rule) {
        resultCard.innerHTML = `<div class="agreement">查無資料</div>`;
        return;
      }
      const product = productDuty(rule);
      const trump = trumpTariff(rule);
      const alert = trumpAlert(rule);

      resultCard.innerHTML = `
        <div class="result-top">
          <div class="rate">${escapeHtml(product)}</div>
          <span class="pill ${pillClass(rule.status)}">${escapeHtml(rule.agreement)}</span>
          <span class="pill ${pillClass(rule.status)}">${escapeHtml(rule.status)}</span>
        </div>
        <div class="agreement">${escapeHtml(rule.origin)} - ${escapeHtml(rule.market)}</div>
        <div class="section">
          <div class="section-title">原產地條件</div>
          <div class="section-body">${escapeHtml(rule.originRule)}</div>
        </div>
        ${marketLinkHtml(rule.market)}
        ${rule.details ? `
        <div class="section">
          <div class="section-title">各協定優惠</div>
          <div class="note">${rule.details.map((item) => `・${escapeHtml(item)}`).join("\n")}</div>
        </div>
        ` : ""}
        ${rule.note ? `
        <div class="section">
          <div class="section-title">備註</div>
          <div class="note">${escapeHtml(rule.note)}</div>
        </div>
        ` : ""}
        ${alert ? `
        <div class="section">
          <div class="us-alert">${escapeHtml(alert)}</div>
        </div>
        ` : ""}
      `;
    }

    function updateMarketOverview() {
      const rows = rules.filter((rule) => rule.market === marketSelect.value);
      overviewSubtitle.textContent = `${marketSelect.value}市場：各產區相對優勢`;
      marketList.innerHTML = rows.map((rule) => `
        <button class="market-row ${rule.origin === originSelect.value ? "active" : ""}" data-origin="${escapeHtml(rule.origin)}" type="button">
          <div class="origin-name">${escapeHtml(rule.origin)}</div>
          <div class="market-summary">${escapeHtml(rule.rate)}｜${escapeHtml(rule.agreement)}</div>
          <span class="status-dot ${classForStatus(rule.status)}" aria-label="${escapeHtml(rule.status)}"></span>
        </button>
      `).join("");

      marketList.querySelectorAll(".market-row").forEach((row) => {
        row.addEventListener("click", () => {
          originSelect.value = row.dataset.origin;
          render();
        });
      });
    }

    function updateTable() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const filtered = rules.filter((rule) => {
        const haystack = `${rule.market} ${rule.origin} ${rule.rate} ${rule.agreement} ${rule.originRule} ${rule.note} ${rule.status} ${(rule.details || []).join(" ")}`.toLowerCase();
        return !keyword || haystack.includes(keyword);
      });

      ruleTable.innerHTML = filtered.map((rule) => `
        ${(() => {
          const product = productDuty(rule);
          const trump = trumpTariff(rule);
          return `
        <tr>
          <td>${escapeHtml(rule.market)}</td>
          <td>${escapeHtml(rule.origin)}</td>
          <td><strong>${escapeHtml(product)}</strong><br><span class="pill ${pillClass(rule.status)}">${escapeHtml(rule.status)}</span></td>
          <td><strong>${escapeHtml(trump)}</strong><br><span class="small">${escapeHtml(rule.market === "美國" ? "政策性加徵參考" : "僅美國市場顯示")}</span></td>
          <td>${escapeHtml(rule.agreement)}</td>
          <td>${escapeHtml(rule.originRule)}${rule.details ? `<br><br><span class="small">${rule.details.map(escapeHtml).join("<br>")}</span>` : ""}</td>
        </tr>
          `;
        })()}
      `).join("");
    }

    function render() {
      updateResult();
      updateMarketOverview();
      updateTable();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    fillSelect(originSelect, origins, "約旦");
    fillSelect(marketSelect, markets, "美國");
    originSelect.addEventListener("change", render);
    marketSelect.addEventListener("change", render);
    keywordInput.addEventListener("input", updateTable);
    render();
  </script>
</body>
</html>
